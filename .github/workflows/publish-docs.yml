name: Publish Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  api-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Linux
        if: runner.os == 'linux'
        run: |
          sudo apt-get install -y cmake libsndfile1

      - name: Install Ludwig
        run: |
          pip install ludwig
          pip install ludwig[viz]

      - name: Set Ludwig version env
        run: |
          echo "ludwig_version=$(python -c "import ludwig; print('.'.join(ludwig.__version__.split('.')[:2]))")" >> $GITHUB_ENV

      - name: Patch Ludwig docstrings
        run: |
          python - <<'EOF'
          import site, os, re
          for sp in site.getsitepackages():
              api_path = os.path.join(sp, 'ludwig', 'api.py')
              if os.path.exists(api_path):
                  with open(api_path, 'r') as f:
                      content = f.read()
                  # Fix bad indentation in preprocess docstring (12-space indent → 16-space)
                  fixed = content.replace(
                      '            structure containing the mappings of the input\n'
                      '                dataset created the first time an input file is used in the same',
                      '                structure containing the mappings of the input\n'
                      '                dataset created the first time an input file is used in the same',
                  )
                  if fixed != content:
                      with open(api_path, 'w') as f:
                          f.write(fixed)
                      print(f'Patched {api_path}')
                  else:
                      print('Pattern not found — already fixed or changed; skipping patch')
                  break
          EOF

      - name: Install dependencies
        run: pip install -r requirements.in

      - name: Setup doc deploy
        run: |
          git config --global user.name ci-bot
          git config --global user.email ci-bot@ludwig.ai

      - name: Publish docs
        run: mike deploy --push --update-aliases ${{ env.ludwig_version }} latest  --alias-type=copy --title="${{ env.ludwig_version }} (latest)"

      - name: Clean up old version titles
        run: |
          mike list | grep '(latest)' | grep -v '\[latest\]' | sed 's/.*(\(.*\)).*/\1/' | while read -r ver; do
            mike retitle --push "$ver" "$ver"
          done

      - name: Copy sitemap, robots.txt, and landing page to root
        run: |
          cp landing/index.html /tmp/landing_index.html
          cp landing/ludwig_logo.svg /tmp/ludwig_logo.svg
          cp landing/ludwig_waves.mp4 /tmp/ludwig_waves.mp4
          cp landing/favicon.ico /tmp/landing_favicon.ico
          cp landing/js/patch.js /tmp/cables_patch.js
          cp landing/og-image.jpg /tmp/og-image.jpg
          git stash --include-untracked
          git checkout gh-pages
          cp ${{ env.ludwig_version }}/sitemap.xml sitemap.xml
          cp ${{ env.ludwig_version }}/robots.txt robots.txt
          cp /tmp/landing_index.html index.html
          cp /tmp/ludwig_logo.svg ludwig_logo.svg
          cp /tmp/ludwig_waves.mp4 ludwig_waves.mp4
          cp /tmp/landing_favicon.ico favicon.ico
          cp /tmp/og-image.jpg og-image.jpg
          mkdir -p js
          cp /tmp/cables_patch.js js/patch.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Deploy landing page and sitemap to gh-pages root.
          branch: gh-pages
          push_options: --force
